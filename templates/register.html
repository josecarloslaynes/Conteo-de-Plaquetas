<!DOCTYPE html>
<html lang="es">
  <head>
      <meta charset="UTF-8">
      <title>Registrarse</title>
      <link rel="stylesheet" href="{{ url_for('static', filename='styles.css') }}">
      <link rel="icon" href="{{ url_for('static', filename='img/icono.png') }}" type="image/x-icon">
  </head>
  <body class="body1">

      <!-- Bloque de mensajes flash -->
      {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
          <div class="flash-messages">
            {% for category, message in messages %}
              <div class="alert alert-{{ category }} flash-message">{{ message }}</div>
            {% endfor %}
          </div>
        {% endif %}
      {% endwith %}

      <div class="register-container">
          <h1>Regístrate</h1>
          <form method="POST" class="register-form">
              <label for="username">Nombre de Usuario:</label>
              <input type="text" name="username" required>

              <label for="email">Correo Electrónico:</label>
              <input type="email" name="email" required>

              <label for="password">Contraseña:</label>
              <input type="password" name="password" required>

              <button type="submit">Registrar</button>
          </form>
          <div class="button-container">
              <a href="{{ url_for('dashboard') }}" class="button3">Atras</a>
              <a href="{{ url_for('logout') }}" class="button2">Cerrar sesión</a>
          </div>
      </div>

      <!-- JavaScript para ocultar el mensaje después de 3 segundos -->
      <script>
        // Espera 3 segundos y luego oculta los mensajes flash
        setTimeout(function() {
          const flashMessages = document.querySelectorAll('.flash-message');
          flashMessages.forEach(function(message) {
            message.style.transition = 'opacity 0.5s ease';
            message.style.opacity = '0';
            setTimeout(() => message.remove(), 500); // Remueve el mensaje después de que desaparezca
          });
        }, 3000); // 3000 ms = 3 segundos
      </script>

  </body>
</html>
